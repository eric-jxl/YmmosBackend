version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ymmosbackend
    ports:
      - "8000:8000"
    environment:
      # 数据库配置
      - DATABASE_URL=sqlite:///./data/sqlmodel.db
      
      # JWT 配置
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-please-change-in-production}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      
      # 应用配置
      - DEBUG=false
      - LOG_LEVEL=INFO
    
    volumes:
      # 持久化数据库和日志
      - ./data:/app/data
      - ./logs:/app/logs
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

